services:
  nifi-2-6-0:
    image: apache/nifi:2.6.0
    entrypoint: ["/bin/sh", "/opt/nifi/scripts/nifi-entrypoint.sh"]
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
      - KEYSTORE_PATH=/opt/nifi/nifi-current/conf/keystore.p12
      - KEYSTORE_TYPE=PKCS12
      - KEYSTORE_PASSWORD=testpassword
      - KEY_PASSWORD=testpassword
      - TRUSTSTORE_PATH=/opt/nifi/nifi-current/conf/truststore.p12
      - TRUSTSTORE_TYPE=PKCS12
      - TRUSTSTORE_PASSWORD=testpassword
      - NIFI_WEB_PROXY_HOST=localhost:8443,localhost:8444,localhost:8445
      # Enable site-to-site listening so the fixture's RPGs (which all
      # target this NiFi) can complete their handshake.
      - REMOTE_INPUT_HOST=nifi-2-6-0
      - REMOTE_INPUT_SECURE=true
    volumes:
      - ./scripts/nifi-entrypoint.sh:/opt/nifi/scripts/nifi-entrypoint.sh:ro
      - ./scripts/certs/keystore.p12:/opt/nifi/nifi-current/conf/keystore.p12:ro
      - ./scripts/certs/truststore.p12:/opt/nifi/nifi-current/conf/truststore.p12:ro
      - ./scripts/nars/nifi-hadoop-libraries-nar-2.6.0.nar:/opt/nifi/nifi-current/lib/nifi-hadoop-libraries-nar-2.6.0.nar:ro
      - ./scripts/nars/nifi-parquet-nar-2.6.0.nar:/opt/nifi/nifi-current/lib/nifi-parquet-nar-2.6.0.nar:ro
    depends_on:
      nifi-registry:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -kfsS -H 'Host: localhost:8443' -o /dev/null https://$$(hostname):8443/nifi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 300s

  nifi-registry:
    image: apache/nifi-registry:2.6.0
    container_name: nifilens-it-registry
    ports:
      - "18080:18080"
    environment:
      - NIFI_REGISTRY_WEB_HTTP_HOST=0.0.0.0
      - NIFI_REGISTRY_WEB_HTTP_PORT=18080
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:18080/nifi-registry-api/buckets || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  zookeeper:
    image: zookeeper:3.9
    environment:
      - ZOO_MY_ID=1
      # ZooKeeper 3.6+ restricts four-letter words to [srvr] by default.
      # Enable ruok for the healthcheck.
      - ZOO_4LW_COMMANDS_WHITELIST=ruok,srvr
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nifi-2-9-0-node1:
    image: apache/nifi:2.9.0
    hostname: nifi-2-9-0-node1
    entrypoint: ["/bin/sh", "/opt/nifi/scripts/nifi-entrypoint.sh"]
    ports:
      - "8444:8443"
    depends_on:
      zookeeper:
        condition: service_healthy
      nifi-registry:
        condition: service_healthy
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
      - KEYSTORE_PATH=/opt/nifi/nifi-current/conf/keystore.p12
      - KEYSTORE_TYPE=PKCS12
      - KEYSTORE_PASSWORD=testpassword
      - KEY_PASSWORD=testpassword
      - TRUSTSTORE_PATH=/opt/nifi/nifi-current/conf/truststore.p12
      - TRUSTSTORE_TYPE=PKCS12
      - TRUSTSTORE_PASSWORD=testpassword
      - NIFI_WEB_PROXY_HOST=localhost:8443,localhost:8444,localhost:8445
      # Clustering — env var names must match what NiFi's start.sh expects.
      # start.sh calls prop_replace with these variables AFTER our entrypoint.
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_ADDRESS=nifi-2-9-0-node1
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=11443
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=30 secs
      - NIFI_SENSITIVE_PROPS_KEY=nifilens-fixture-key
    volumes:
      - ./scripts/nifi-entrypoint.sh:/opt/nifi/scripts/nifi-entrypoint.sh:ro
      - ./scripts/certs/keystore.p12:/opt/nifi/nifi-current/conf/keystore.p12:ro
      - ./scripts/certs/truststore.p12:/opt/nifi/nifi-current/conf/truststore.p12:ro
      - ./scripts/nars/nifi-hadoop-libraries-nar-2.9.0.nar:/opt/nifi/nifi-current/lib/nifi-hadoop-libraries-nar-2.9.0.nar:ro
      - ./scripts/nars/nifi-parquet-nar-2.9.0.nar:/opt/nifi/nifi-current/lib/nifi-parquet-nar-2.9.0.nar:ro
    healthcheck:
      test:
        ["CMD-SHELL", "curl -kfsS -H 'Host: localhost:8443' -o /dev/null https://$$(hostname):8443/nifi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 300s

  nifi-2-9-0-node2:
    image: apache/nifi:2.9.0
    hostname: nifi-2-9-0-node2
    entrypoint: ["/bin/sh", "/opt/nifi/scripts/nifi-entrypoint.sh"]
    ports:
      - "8445:8443"
    depends_on:
      zookeeper:
        condition: service_healthy
      nifi-registry:
        condition: service_healthy
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
      - KEYSTORE_PATH=/opt/nifi/nifi-current/conf/keystore.p12
      - KEYSTORE_TYPE=PKCS12
      - KEYSTORE_PASSWORD=testpassword
      - KEY_PASSWORD=testpassword
      - TRUSTSTORE_PATH=/opt/nifi/nifi-current/conf/truststore.p12
      - TRUSTSTORE_TYPE=PKCS12
      - TRUSTSTORE_PASSWORD=testpassword
      - NIFI_WEB_PROXY_HOST=localhost:8443,localhost:8444,localhost:8445
      # Clustering
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_ADDRESS=nifi-2-9-0-node2
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=11443
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=30 secs
      - NIFI_SENSITIVE_PROPS_KEY=nifilens-fixture-key
    volumes:
      - ./scripts/nifi-entrypoint.sh:/opt/nifi/scripts/nifi-entrypoint.sh:ro
      - ./scripts/certs/keystore.p12:/opt/nifi/nifi-current/conf/keystore.p12:ro
      - ./scripts/certs/truststore.p12:/opt/nifi/nifi-current/conf/truststore.p12:ro
      - ./scripts/nars/nifi-hadoop-libraries-nar-2.9.0.nar:/opt/nifi/nifi-current/lib/nifi-hadoop-libraries-nar-2.9.0.nar:ro
      - ./scripts/nars/nifi-parquet-nar-2.9.0.nar:/opt/nifi/nifi-current/lib/nifi-parquet-nar-2.9.0.nar:ro
    healthcheck:
      test:
        ["CMD-SHELL", "curl -kfsS -H 'Host: localhost:8443' -o /dev/null https://$$(hostname):8443/nifi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 300s

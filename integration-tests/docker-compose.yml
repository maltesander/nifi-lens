services:
  nifi:
    image: apache/nifi:${NIFI_IMAGE_TAG:-2.9.0}
    entrypoint: ["/bin/sh", "/opt/nifi/scripts/nifi-entrypoint.sh"]
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword123
      - KEYSTORE_PATH=/opt/nifi/nifi-current/conf/keystore.p12
      - KEYSTORE_TYPE=PKCS12
      - KEYSTORE_PASSWORD=testpassword
      - KEY_PASSWORD=testpassword
      - TRUSTSTORE_PATH=/opt/nifi/nifi-current/conf/truststore.p12
      - TRUSTSTORE_TYPE=PKCS12
      - TRUSTSTORE_PASSWORD=testpassword
    volumes:
      - ./scripts/nifi-entrypoint.sh:/opt/nifi/scripts/nifi-entrypoint.sh:ro
      - ./scripts/certs/keystore.p12:/opt/nifi/nifi-current/conf/keystore.p12:ro
      - ./scripts/certs/truststore.p12:/opt/nifi/nifi-current/conf/truststore.p12:ro
    healthcheck:
      test:
        ["CMD-SHELL", "grep -q 'Started Server on https://' /opt/nifi/nifi-current/logs/nifi-app.log 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

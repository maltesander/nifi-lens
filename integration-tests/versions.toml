# Single source of truth for the NiFi versions the integration harness
# boots and tests against. Consumed by:
#   - build.rs (emits FIXTURE_VERSIONS const into $OUT_DIR)
#   - integration-tests/run.sh (via grep)
#   - CI drift check (fails if docker-compose.yml / nifilens-config.toml drift)
#
# Bumping the ceiling (e.g., adding 2.9.0):
#   1. Edit this file.
#   2. Edit integration-tests/docker-compose.yml.
#   3. Edit integration-tests/nifilens-config.toml.
#   4. Edit tests/common/versions.rs (port_for match arm).
#   5. Push. CI drift check will fail loudly if you missed any of steps 2–4.
versions = ["2.6.0", "2.8.0"]

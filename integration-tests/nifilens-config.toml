# Committed live-testing config for the integration fixture.
#
# Usage (live dev):
#   export NIFILENS_IT_PASSWORD=adminpassword123
#   cargo run -- --config integration-tests/nifilens-config.toml \
#                --context dev-nifi-2-8-0
#
# Usage (seeder):
#   cargo run -p nifilens-fixture-seeder -- \
#     --config integration-tests/nifilens-config.toml --context dev-nifi-2-6-0
#
# The same password env var is set by integration-tests/run.sh.

current_context = "dev-nifi-2-8-0"

[[contexts]]
name = "dev-nifi-2-6-0"
url = "https://localhost:8443"
username = "admin"
password_env = "NIFILENS_IT_PASSWORD"
ca_cert_path = "integration-tests/scripts/certs/ca.crt"
version_strategy = "closest"

[[contexts]]
name = "dev-nifi-2-8-0"
url = "https://localhost:8444"
username = "admin"
password_env = "NIFILENS_IT_PASSWORD"
ca_cert_path = "integration-tests/scripts/certs/ca.crt"
version_strategy = "closest"

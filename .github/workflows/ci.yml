name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps

  msrv:
    name: MSRV check (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    env:
      # Override rust-toolchain.toml (which pins 1.93 for development) so we
      # actually compile against the declared MSRV.
      RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
    strategy:
      matrix:
        rust: ["1.88"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - uses: pre-commit/action@v3.0.1

  fixture-version-drift:
    name: Fixture version drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check versions.toml / docker-compose.yml / nifilens-config.toml consistency
        run: |
          set -euo pipefail
          VERSIONS=$(grep -oP '"\K[0-9]+\.[0-9]+\.[0-9]+(?=")' integration-tests/versions.toml | sort -u)
          COMPOSE=$(grep -oP 'apache/nifi:\K[0-9]+\.[0-9]+\.[0-9]+' integration-tests/docker-compose.yml | sort -u)
          CONFIG=$(grep -oP 'dev-nifi-\K[0-9]+-[0-9]+-[0-9]+' integration-tests/nifilens-config.toml | tr '-' '.' | sort -u)
          if [ "$VERSIONS" != "$COMPOSE" ] || [ "$VERSIONS" != "$CONFIG" ]; then
            echo "ERROR: fixture version drift detected" >&2
            echo "versions.toml: $VERSIONS" >&2
            echo "docker-compose.yml: $COMPOSE" >&2
            echo "nifilens-config.toml: $CONFIG" >&2
            exit 1
          fi
          echo "Fixture versions consistent: $VERSIONS"
